server:
  port: 3003

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/parking
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

garage:
  simulator-url: http://localhost:9000