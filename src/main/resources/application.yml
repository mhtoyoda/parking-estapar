server:
  port: 3003

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/parking
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
  jackson:
    deserialization:
      adjust-dates-to-context-time-zone: false
    serialization:
      write-dates-as-timestamps: false

garage:
  simulator-url: http://localhost:9000